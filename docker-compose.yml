  version: '3.8'                                                                                                                                                                                                                                              
  services:                                                                                                                                                                                                                                                   
    mysql:                                                                                                                                                                                                                                                    
      image: mysql:8.0                                                                                                                                                                                                                                        
      container_name: critter-mysql                                                                                                                                                                                                                           
      environment:                                                                                                                                                                                                                                            
        MYSQL_ROOT_PASSWORD: root                                                                                                                                                                                                                             
        MYSQL_DATABASE: critter                                                                                                                                                                                                                               
        MYSQL_USER: critter                                                                                                                                                                                                                                   
        MYSQL_PASSWORD: critter                                                                                                                                                                                                                               
      ports:                                                                                                                                                                                                                                                  
        - "3306:3306"                                                                                                                                                                                                                                         
      volumes:                                                                                                                                                                                                                                                
        - critter-mysql-data:/var/lib/mysql                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                              
  volumes:                                                                                                                                                                                                                                                    
    critter-mysql-data:  